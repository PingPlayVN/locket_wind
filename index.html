<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Locket Web Clone</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/camera.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/caption.css">
    <link rel="stylesheet" href="css/custom-caption.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.css"/>
    <script defer src="https://cdn.jsdelivr.net/gh/mdbassit/Coloris@latest/dist/coloris.min.js"></script>
</head>
<body>

<div class="app-container">
    
    <div id="cameraView" class="camera-view">
        
        <div id="mainTopBar" class="top-bar">
            <img id="btnOpenProfile" src="https://www.w3schools.com/howto/img_avatar.png" class="top-avatar-btn">
            <button id="btnOpenFriends" class="top-friends-pill">👥 Bạn bè</button>
            <button class="top-chat-btn">💬</button>
        </div>

        <div id="postTopBar" class="post-top-bar" style="display: none;">
            <div class="spacer"></div>
            <div class="title">Gửi đến...</div>
            <div class="spacer right"><button class="btn-download">📥</button></div>
        </div>

        <div style="position: relative; width: 100%; margin-bottom: 10px;">
            <div id="recordingProgressWrapper" style="position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border-radius: 43px; background: conic-gradient(#FFD700 var(--progress, 0%), transparent 0); z-index: 0; display: none;"></div>
            
            <div class="viewfinder-container" style="margin-bottom: 0; position: relative; z-index: 1;">
                <video id="cameraVideo" class="camera-video" autoplay playsinline></video>
                <img id="previewImage" class="preview-image" style="display: none;">
                <video id="previewVideo" class="preview-image" autoplay loop muted playsinline style="display: none;"></video>
                
                <div id="captionOverlay" class="caption-overlay-pill" style="display: none;">
                    <span id="captionEmojiDisplay" style="display: none; font-size: 20px; margin-right: 6px;"></span>
                    <img id="captionGifDisplay" src="" style="display: none; width: 24px; height: 24px; margin-right: 8px; object-fit: contain; border-radius: 4px;">
                    <input type="text" id="modalCaptionInput" placeholder="Nhập tin nhắn..." autocomplete="off">
                </div>
            </div>
        </div>

        <div id="bottomControls" class="bottom-controls-ios">
            <button id="btnGallery" class="btn-icon-ios btn-gallery-ios"></button>
            <button id="btnCapture" class="btn-capture-ios"></button>
            <button id="btnFlipCamera" class="btn-icon-ios">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 2.1l4 4-4 4"/>
                <path d="M3 12.2v-2a4 4 0 0 1 4-4h12.8"/>
                <path d="M7 21.9l-4-4 4-4"/>
                <path d="M21 11.8v2a4 4 0 0 1-4 4H4.2"/>
                </svg>
            </button>
        </div>

        <div id="postActionControls" class="post-action-controls" style="display: none;">
            
            <button id="btnCancelPost" class="btn-post-action">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            
            <button id="btnConfirmSend" class="btn-post-send">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
            
            <button id="btnMagic" class="btn-post-action">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"></path></svg>
            </button> 
            
        </div>

        <div id="horizontalFriendsList" class="horizontal-friends-list" style="display: none;">
        </div>

        <div id="captionEditorSheet" class="hide-scrollbar locket-style-sheet" style="display: none; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; height: 50vh; background: #1a1a1c; border-radius: 30px 30px 0 0; padding: 20px 20px 40px 20px; z-index: 50; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); box-sizing: border-box; flex-direction: column;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;">
                <span style="font-weight: bold; font-size: 16px; color: white;">✨ Locket Styles</span>
                <button id="btnCloseCaptionEditor" style="background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px;">✕</button>
            </div>

            <div id="captionThemesContainer" style="flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; width: 100%; padding-bottom: 40px; scrollbar-width: none;">
            </div>
        </div>

        <div id="customCaptionCreatorSheet" class="hide-scrollbar custom-caption-sheet" style="display: none; pointer-events: auto; position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; height: 85vh; background: #151515; border-radius: 30px 30px 0 0; padding: 20px 20px 40px 20px; z-index: 999999; box-shadow: 0 -5px 20px rgba(0,0,0,0.8); box-sizing: border-box; flex-direction: column;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-shrink: 0;">
                <span style="font-weight: bold; font-size: 16px; color: white;">✨ Tự Tạo Caption</span>
                <button id="btnCloseCustomCreator" style="background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px;">✕</button>
            </div>

            <div style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; padding-bottom: 20px;" class="hide-scrollbar">
                
                <div class="custom-preview-stage" style="display: flex; justify-content: center; align-items: center; margin-bottom: 15px; padding: 30px 20px; background: #000; border-radius: 16px; border: 1px dashed #444; min-height: 120px;">
                    <div id="localCustomPreview" class="caption-custom-preview" style="background: rgba(0,0,0,0.5); padding: 8px 18px; border-radius: 999px; display: inline-flex; flex-direction: row; align-items: center; justify-content: center; gap: 8px; min-width: 150px; max-width: 100%; transition: all 0.2s;">
                        <img id="localPreviewGif" src="" style="width: 24px; height: 24px; display: none; margin: 0; border-radius: 6px; object-fit: cover; flex-shrink: 0;" />
                        <span id="localPreviewText" style="color: #ffffff; font-weight: 700; font-size: 15px; line-height: 1.25; text-shadow: 0 1px 3px rgba(0,0,0,0.8); text-align: center; overflow-wrap: anywhere;">Văn bản mẫu</span>
                    </div>
                </div>

                <div class="custom-controls-wrapper" style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px;">
                    <input type="text" id="customTextInput" placeholder="Nhập dòng trạng thái..." autocomplete="off">
                    
                    <div>
                        <label style="font-size: 12px; color: #888; margin-bottom: 4px; display: block; font-weight: bold;">Màu chữ</label>
                        <input type="text" id="customTextColor" value="#ffffff" data-coloris>
                    </div>

                    <div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label style="font-size: 12px; color: #888; font-weight: bold;">Màu nền (Tối đa 8 màu)</label>
                            <button id="btnAddBgColor" style="background: none; border: none; color: #10b981; font-size: 12px; font-weight: bold; cursor: pointer; padding: 4px;">+ Thêm màu</button>
                        </div>
                        <div id="bgColorList" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                </div>

                <div class="giphy-search-wrapper" style="margin-bottom: 10px; display: flex; gap: 8px;">
                    <input type="text" id="giphySearchInput" placeholder="🔍 Tìm kiếm ảnh động..." autocomplete="off" style="flex: 1;">
                    <button id="btnSearchGiphy" style="background: #2c2c2e; border: 1px solid #444; color: white; border-radius: 12px; padding: 0 15px; font-weight: bold; cursor: pointer; flex-shrink: 0;">Tìm</button>
                </div>
                
                <div id="giphyLoader" style="display: none; text-align: center; color: #888; margin: 10px 0; font-size: 13px;">Đang tìm kiếm...</div>
                
                <div id="giphyResultsGrid" class="giphy-grid hide-scrollbar" style="min-height: 200px;">
                    <div style="text-align: center; grid-column: 1 / -1; color: #555; font-size: 13px; margin-top: 20px;">Nhập từ khóa để gán ảnh động vào Caption</div>
                </div>

                <div id="giphyPagination" style="display: none; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #333;">
                    <button id="btnPrevGiphy" style="background: #2c2c2e; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;">◀ Trước</button>
                    <span id="giphyPageInfo" style="color: #aaa; font-size: 12px; font-weight: bold;">Trang 1</span>
                    <button id="btnNextGiphy" style="background: #2c2c2e; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px;">Sau ▶</button>
                </div>
            </div>

            <button id="btnApplyCustom" style="width: 100%; margin-top: 10px; padding: 14px; border-radius: 14px; background: #FFD700; color: #000; font-weight: bold; font-size: 16px; border: none; cursor: pointer; flex-shrink: 0;">Áp dụng Caption</button>

        </div>

    </div>

    <div id="loginModal" class="modal-overlay active">
        <div class="modal-content" style="border-radius: 0; height: 100%; display:flex; flex-direction:column; justify-content:center;">
            <h2 style="text-align: center; color: #FFD700; margin-bottom: 20px;">🔑 Đăng Nhập</h2>
            <input type="email" id="email" placeholder="Email của bạn">
            <input type="password" id="password" placeholder="Mật khẩu">
            <button id="btnLogin" class="btn-primary">Đăng Nhập</button>
            <div id="loginMsg" style="text-align: center; color: #ff4444; margin-top: 10px; font-size: 13px;"></div>
        </div>
    </div>

    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close-modal" id="btnCloseProfile">✕</button>
            <h3 style="text-align: center; color:#FFD700; margin-bottom: 20px;">Hồ Sơ Của Bạn</h3>
            <div style="text-align:center; margin-bottom: 20px;">
                <img id="userAvatar" src="" style="width:80px; height:80px; border-radius:50%; border: 2px solid #FFD700;">
                <h3 id="userFullName" style="margin-top:10px;">Đang tải...</h3>
                <p id="userUsername" style="color:#888;">@username</p>
            </div>
            <div class="info-row"><span class="info-label">UID</span><span id="userUid">-</span></div>
            <div class="info-row"><span class="info-label">Hạng</span><span id="userBadge" style="color:#FFD700;">Tiêu chuẩn</span></div>
            <div id="statusMessage" style="text-align: center; font-size: 12px; margin-top: 10px; color: #00e676;"></div>
            <button onclick="localStorage.removeItem('locket_session'); location.reload();" class="btn-primary" style="background:#333; color:#fff; margin-top:20px;">Đăng Xuất</button>
        </div>
    </div>

    <div id="friendsModal" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-close-modal" id="btnCloseFriends">✕</button>
            <h3 style="text-align: center; margin-bottom: 20px;">Thêm Bạn Bè</h3>
            <div class="search-row">
                <input type="text" id="searchUsername" placeholder="Nhập username...">
                <button id="btnSearchFriend" class="btn-primary" style="background: #333; color: #fff;">Tìm</button>
            </div>
            <div id="searchResultBox"></div>
            <hr style="border-color: #262626; margin: 25px 0 15px 0;">
            <h4 style="color: #FFD700; font-size: 14px; margin-bottom: 15px;">👥 Danh sách của bạn</h4>
            <div id="myFriendsList" style="max-height: 40vh; overflow-y: auto;">
                <div style="text-align:center; color:#666; font-size:13px; padding: 20px;">Danh sách bạn bè sẽ hiện ở đây</div>
            </div>
        </div>
    </div>

    <div id="uploadProgressOverlay" class="modal-overlay" style="z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: rgba(20,20,20,0.95); padding: 30px; border-radius: 20px; text-align: center; width: 80%; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
            <div id="uploadStatusText" style="color: #FFD700; font-weight: bold; margin-bottom: 15px; font-size: 16px;">Đang chuẩn bị... 0%</div>
            <div style="width: 100%; height: 10px; background: #333; border-radius: 10px; overflow: hidden;">
                <div id="uploadProgressBar" style="width: 0%; height: 100%; background: #FFD700; transition: width 0.3s ease;"></div>
            </div>
        </div>
    </div>
</div>

<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/custom-caption.js"></script>
</body>
</html>
